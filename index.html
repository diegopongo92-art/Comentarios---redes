<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MML Enterprise Social Listening</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-slate-100 font-sans p-6">

<div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-black text-slate-900">MML SOCIAL LISTENING <span class="text-red-600">PRO</span></h1>
        <input type="file" id="file-upload" class="bg-white border border-slate-300 p-2 rounded-lg shadow-sm cursor-pointer hover:bg-slate-50"/>
    </div>

    <!-- KPI Cards -->
    <div class="grid grid-cols-4 gap-4 mb-8">
        <div class="bg-white p-6 rounded-2xl border shadow-sm">
            <p class="text-sm text-slate-500 font-bold uppercase">Total Menciones</p>
            <p id="kpi-total" class="text-4xl font-black">0</p>
        </div>
        <div class="bg-white p-6 rounded-2xl border shadow-sm border-l-4 border-l-red-600">
            <p class="text-sm text-slate-500 font-bold uppercase">Críticas/Quejas</p>
            <p id="kpi-criticas" class="text-4xl font-black text-red-600">0</p>
        </div>
        <div class="bg-white p-6 rounded-2xl border shadow-sm border-l-4 border-l-green-600">
            <p class="text-sm text-slate-500 font-bold uppercase">Positivos</p>
            <p id="kpi-positivos" class="text-4xl font-black text-green-600">0</p>
        </div>
        <div class="bg-white p-6 rounded-2xl border shadow-sm border-l-4 border-l-blue-600">
            <p class="text-sm text-slate-500 font-bold uppercase">Política</p>
            <p id="kpi-politica" class="text-4xl font-black text-blue-600">0</p>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm"><canvas id="timelineChart"></canvas></div>
        <div class="bg-white p-6 rounded-2xl shadow-sm"><canvas id="categoryChart"></canvas></div>
    </div>

    <div class="mt-8 bg-white p-6 rounded-2xl shadow-sm overflow-x-auto">
        <table id="main-table" class="w-full text-left">
            <thead><tr class="border-b uppercase text-xs text-slate-500"><th>Fecha</th><th>Usuario</th><th>Comentario</th><th>Análisis</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const Engine = {
        irony: ["gracias a", "gracias por", "genial", "excelente", "sigan así"],
        bad: ["incendio", "ilegal", "inútil", "podrido", "basura", "corrupción", "destruido", "caos", "abandonado", "vago", "inepto", "medieval", "trikina", "chancho", "porky"],
        politics: ["renovación", "alcalde", "muni", "lima", "reggiardo", "keiko", "panamericana"]
    };

    document.getElementById('file-upload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            analyze(json);
        };
        reader.readAsArrayBuffer(file);
    });

    function analyze(data) {
        let totals = { total: 0, criticas: 0, positivos: 0, politica: 0 };
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        data.forEach(row => {
            const text = (row.Text || row.Comentario || "").toLowerCase();
            let isCritica = Engine.bad.some(w => text.includes(w));
            let isIronico = Engine.irony.some(w => text.includes(w));
            let isPolitico = Engine.politics.some(w => text.includes(w));
            
            let sentiment = (isIronico && isCritica) || isCritica ? "Negativo" : (isIronico ? "Positivo" : "Neutral");
            
            if(sentiment === "Negativo") totals.criticas++;
            if(sentiment === "Positivo") totals.positivos++;
            if(isPolitico) totals.politica++;
            totals.total++;

            tbody.innerHTML += `<tr>
                <td class="p-4 border-b">${row.Fecha || 'N/A'}</td>
                <td class="p-4 border-b font-bold">${row.User || 'Anónimo'}</td>
                <td class="p-4 border-b">${text}</td>
                <td class="p-4 border-b"><span class="px-2 py-1 rounded text-xs ${sentiment === 'Negativo' ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'}">${sentiment}</span></td>
            </tr>`;
        });

        document.getElementById('kpi-total').innerText = totals.total;
        document.getElementById('kpi-criticas').innerText = totals.criticas;
        document.getElementById('kpi-positivos').innerText = totals.positivos;
        document.getElementById('kpi-politica').innerText = totals.politica;
    }
</script>
</body>
</html>
